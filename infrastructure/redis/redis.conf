# ─────────────────────────────────────────────
# Redis configuration for WhatsUp
# ─────────────────────────────────────────────

# Network parameters
port 6379
protected-mode yes

# Memory management
# Limit max memory usage (e.g. 512MB for local development)
maxmemory 512mb
# Evict keys using LRU when memory limit is reached
maxmemory-policy allkeys-lru

# Persistence settings
# Save snapshot every 15 mins if at least 1 key changed
save 900 1
# Save snapshot every 5 mins if at least 10 keys changed
save 300 10
# Save snapshot every 60 seconds if at least 10000 keys changed
save 60 10000

# Enable AOF (Append Only File) persistence for task queue safety
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance tuning
tcp-backlog 511
timeout 0
tcp-keepalive 300
databases 16
